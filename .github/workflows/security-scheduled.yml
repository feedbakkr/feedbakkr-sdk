name: Scheduled Security Scan

on:
  schedule:
    # 03:30 UTC daily — staggered from the other Feedbakkr repos so the org's
    # overall scan window is spread out.
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Scheduled security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci

      - name: Native dependency audit (moderate+)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Install OSV-Scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run OSV-Scanner (JSON report)
        run: osv-scanner --recursive --format=json --output=osv-report.json .
        continue-on-error: true

      - name: Run OSV-Scanner (human-readable summary)
        if: always()
        run: osv-scanner --recursive .
        continue-on-error: true

      - name: Upload OSV report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: osv-report
          path: osv-report.json
          retention-days: 30
          if-no-files-found: ignore
