name: Publish

# Triggered by a v*.*.* tag or manual dispatch. Runs the verify:publish gate
# (tests → typecheck → audit → build → npm pack --dry-run) before
# `npm publish --provenance`.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0). Must already exist on the repo.'
        required: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Verify publish-readiness
        run: npm run verify:publish

      - name: Show pack contents
        run: npm pack --dry-run --json

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
