name: Publish

# Triggered by a v*.*.* tag or manual dispatch. Runs the verify:publish gate
# (tests → typecheck → audit → build → npm pack --dry-run) before
# `npm publish --provenance`.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0). Must already exist on the repo.'
        required: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Node 24 ships with npm 11.x out of the box, which has the OIDC
      # token-exchange logic that trusted publishing needs. Node 22's
      # bundled npm 10.x lacks it. No `registry-url` because setup-node
      # would write an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` which
      # forces npm down the token-auth path before it considers OIDC.
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Verify publish-readiness
        run: npm run verify:publish

      - name: Show pack contents
        run: npm pack --dry-run --json

      # `--provenance` triggers OIDC token exchange against the trusted-
      # publisher entry on npmjs.com pointing at this repo + workflow.
      # No `NODE_AUTH_TOKEN` env — OIDC handles auth.
      - name: Publish
        run: npm publish --access public --provenance
